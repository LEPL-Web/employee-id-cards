
<!DOCTYPE html>
<html>
<head>
  <title>Employee Details</title>

  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      text-align: center;
      padding: 20px;
    }

    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 60%;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    th, td {
      border: 1px solid #ddd;
      padding: 10px;
    }

    th {
      background: #2c3e50;
      color: white;
      text-align: left;
      width: 40%;
    }

    h2, h3 {
      margin-top: 30px;
    }

    .error {
      color: red;
      font-size: 20px;
      margin-top: 50px;
    }
  </style>

</head>
<body>

<h2>Employee Details</h2>

<table id="mainTable">
  <tr><th>Employee ID</th><td id="empId"></td></tr>
  <tr><th>Joining Date</th><td id="joining"></td></tr>
  <tr><th>Employee Name</th><td id="name"></td></tr>
  <tr><th>Designation</th><td id="designation"></td></tr>
  <tr><th>Company Name</th><td id="company"></td></tr>
  <tr><th>Email ID</th><td id="email"></td></tr>
  <tr><th>Contact No.</th><td id="phone"></td></tr>
  <tr><th>Address</th><td id="address"></td></tr>
</table>

<h3 id="emergencyTitle">Emergency Details</h3>

<table id="emergencyTable">
  <tr><th>Contact Person</th><td id="ePerson"></td></tr>
  <tr><th>Relation</th><td id="relation"></td></tr>
  <tr><th>Contact No.</th><td id="ePhone"></td></tr>
</table>

<div id="error" class="error"></div>

<script>
/* 🔹 DATA (yahin 100+ employees add kar sakta hai) */
const data = {
  "EMP001": {
    employeeId: "EMP001",
    joiningDate: "2022-01-15",
    name: "Rahul Sharma",
    designation: "Software Engineer",
    company: "ABC Pvt Ltd",
    email: "rahul@example.com",
    phone: "9876543210",
    address: "Delhi",
    emergency: {
      person: "Suresh Sharma",
      relation: "Father",
      phone: "9123456780"
    }
  },

  "EMP002": {
    employeeId: "EMP002",
    joiningDate: "2023-03-10",
    name: "Amit Verma",
    designation: "Manager",
    company: "ABC Pvt Ltd",
    email: "amit@example.com",
    phone: "9988776655",
    address: "Noida",
    emergency: {
      person: "Neha Verma",
      relation: "Wife",
      phone: "9001122334"
    }
  }

  // 👉 yahin aur employees add kar (EMP003 ... EMP100)
};


/* 🔹 URL se ID nikaalna */
const params = new URLSearchParams(window.location.search);
const id = params.get("id");


/* 🔹 Data show karna */
if (id && data[id]) {

  const emp = data[id];

  document.getElementById("empId").innerText = emp.employeeId;
  document.getElementById("joining").innerText = emp.joiningDate;
  document.getElementById("name").innerText = emp.name;
  document.getElementById("designation").innerText = emp.designation;
  document.getElementById("company").innerText = emp.company;
  document.getElementById("email").innerText = emp.email;
  document.getElementById("phone").innerText = emp.phone;
  document.getElementById("address").innerText = emp.address;

  document.getElementById("ePerson").innerText = emp.emergency.person;
  document.getElementById("relation").innerText = emp.emergency.relation;
  document.getElementById("ePhone").innerText = emp.emergency.phone;

} else {

  document.getElementById("mainTable").style.display = "none";
  document.getElementById("emergencyTable").style.display = "none";
  document.getElementById("emergencyTitle").style.display = "none";

  document.getElementById("error").innerText = "❌ Employee Not Found";
}

</script>

</body>
</html>
